name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff format --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      # The 3.12 job reports coverage (machine-readable, additive — no fail-under
      # gate). Other matrix versions keep running plain tests.
      - name: Run tests
        if: matrix.python-version != '3.12'
        run: pytest -q
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest -q --cov=nexus_exchange --cov-report=term-missing --cov-report=xml
      - name: Emit coverage percentage
        if: matrix.python-version == '3.12'
        run: |
          set -euo pipefail
          pct="$(python -c "import xml.etree.ElementTree as ET; print(round(float(ET.parse('coverage.xml').getroot().get('line-rate')) * 100, 2))")"
          echo "Test coverage: ${pct}%"
          {
            echo "## Test coverage"
            echo ""
            echo "**${pct}%** line coverage (\`nexus_exchange\`, Python 3.12)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error

  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check pinned API spec version against latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPEC_REPO: nexus-xyz/nexus-exchange-api
        run: |
          set -euo pipefail
          pinned="$(tr -d '[:space:]' < .api-version)"
          [ -n "$pinned" ] || { echo "::error file=.api-version::.api-version is empty"; exit 1; }
          echo "Pinned API spec version: $pinned"
          api="https://api.github.com/repos/${SPEC_REPO}"
          pinned_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${api}/releases/tags/${pinned}")"
          [ "$pinned_status" = "200" ] || { echo "::error::Pinned spec ${pinned} not found as a release in ${SPEC_REPO} (HTTP ${pinned_status})."; exit 1; }
          latest="$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${api}/releases/latest" | jq -r '.tag_name // empty')"
          [ -n "$latest" ] || { echo "::error::Could not determine latest release of ${SPEC_REPO}."; exit 1; }
          echo "Latest API spec release:  $latest"
          if [ "$pinned" != "$latest" ]; then
            echo "::error::Spec drift: SDK pins ${pinned} but the latest Exchange API spec is ${latest}. Bump .api-version (and the README table) once updated."
            exit 1
          fi
          echo "No drift: pinned to the latest API spec (${pinned})."
