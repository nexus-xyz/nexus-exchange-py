      #     [ -n "$pinned" ] || { echo "::error file=.api-version::.api-version is empty"; exit 1; }
      #     echo "Pinned API spec version: $pinned"
      #     api="https://api.github.com/repos/${SPEC_REPO}"
      #     pinned_status="$(curl -sS -o /dev/null -w '%{http_code}' \
      #       -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
      #       "${api}/releases/tags/${pinned}")"
      #     [ "$pinned_status" = "200" ] || { echo "::error::Pinned spec ${pinned} not found as a release in ${SPEC_REPO} (HTTP ${pinned_status})."; exit 1; }
      #     latest="$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
